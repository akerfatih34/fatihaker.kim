<!DOCTYPE html>
<html lang="tr" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% if page.title %}{{ page.title }} | Fatih Aker{% else %}Fatih Aker — Blog{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta name="author" content="Fatih Aker" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  <!-- Open Graph -->
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}Fatih Aker Blog{% endif %}" />
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="{{ site.url }}/profile_hero.jpg" />
  <meta property="og:locale" content="tr_TR" />
  <meta property="og:site_name" content="Fatih Aker" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}Fatih Aker Blog{% endif %}" />
  <meta name="twitter:image" content="{{ site.url }}/profile_hero.jpg" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0a0a0a;
      --ink2:   #111111;
      --ink3:   #1a1a1a;
      --paper:  #f2ede6;
      --gold:   #c9a84c;
      --gold2:  #e8c96a;
      --smoke:  #888880;
      --mist:   #555550;
      --cream:  #d6cfc4;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--ink);
      color: var(--cream);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { color: var(--gold); text-decoration: none; transition: color .3s; }
    a:hover { color: var(--gold2); }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.5rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,10,10,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 400;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--cream); text-decoration: none;
    }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--smoke); text-decoration: none; font-weight: 500;
      transition: color .3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }

    /* ── MAIN CONTENT ── */
    main {
      padding-top: 7rem;
      min-height: 100vh;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--ink2);
      border-top: 1px solid rgba(255,255,255,.06);
      padding: 3rem;
      text-align: center;
    }
    .footer-inner {
      max-width: 700px; margin: 0 auto;
    }
    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 300;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--cream); margin-bottom: .75rem;
    }
    .footer-meta {
      font-size: .7rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--mist); margin-bottom: 1.5rem;
    }
    .footer-links { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
    .footer-links a {
      font-size: .7rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--mist); text-decoration: none; transition: color .3s;
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy {
      margin-top: 2rem;
      font-size: .65rem; color: var(--mist); letter-spacing: .05em;
    }

    @media (max-width: 640px) {
      nav { padding: 1.25rem 1.5rem; }
      .nav-links { gap: 1.25rem; }
      .nav-links a { font-size: .65rem; }
    }
  </style>

  {% if page.extra_css %}{{ page.extra_css }}{% endif %}
</head>
<body>

  <nav>
    <a href="/" class="nav-brand">Fatih Aker</a>
    <ul class="nav-links">
      <li><a href="/">Ana Sayfa</a></li>
      <li><a href="/#hikaye">Hikaye</a></li>
      <li><a href="/#sirketler">Şirketler</a></li>
      <li><a href="/#iletisim">İletişim</a></li>
      <li><a href="/blog/" class="active">Blog</a></li>
    </ul>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-brand">Fatih Aker</div>
      <div class="footer-meta">Genel Koordinatör & Fabrika Müdürü — Gönen, Balıkesir</div>
      <div class="footer-links">
        <a href="/">Ana Sayfa</a>
        <a href="/blog/">Blog</a>
        <a href="https://linkedin.com/in/fatihaker" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:akerfatih34@gmail.com">E-posta</a>
      </div>
      <div class="footer-copy">© {{ "now" | date: "%Y" }} Fatih Aker · fatihaker.kim</div>
    </div>
  </footer>

</body>
</html>
